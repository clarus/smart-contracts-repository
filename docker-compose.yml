services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-contracts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contracts
      POSTGRES_PASSWORD: contracts
      POSTGRES_DB: smart_contracts
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contracts -d smart_contracts"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
